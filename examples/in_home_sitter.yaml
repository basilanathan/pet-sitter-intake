# Example config for in-home pet sitting
# Usage: python scripts/generate_form.py --config examples/in_home_sitter.yaml

business_name: "Home Sweet Home Pet Sitting"
sitter_name: "Sarah Chen"
services: "In-Home Pet Sitting, Overnight Stays, Drop-in Visits, House Sitting"
location: "Seattle, WA"
contact: "sarah@homesweethomepets.com | (206) 555-PETS"

# Form settings
service_type: general         # Full intake form with all sections
num_pets: 2                   # Many clients have multiple pets
fillable: true

# Section overrides (general defaults: all sections enabled except service_specific)
# Using defaults - all sections enabled is perfect for in-home sitting
# sections:
#   home_access: true         # Critical for in-home sitting (default for general)

# Output
output: "in_home_intake.pdf"

# Branding
theme: lavender               # Warm, welcoming feel

# Custom colors (optional - uncomment to override theme)
# theme: custom
# colors:
#   primary: "#E8DFF5"
#   primary_dark: "#7B68A6"
#   accent: "#F5C6AA"
