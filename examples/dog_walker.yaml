# Example config for a dog walking service
# Usage: python scripts/generate_form.py --config examples/dog_walker.yaml

business_name: "Urban Paws Dog Walking"
sitter_name: "Alex Rivera"
services: "Dog Walking, Potty Breaks, Park Visits"
location: "Chicago, IL"
contact: "alex@urbanpaws.dog | (312) 555-WALK"

# Form settings
service_type: walking         # Minimal form with behavior + leash behavior sections
num_pets: 1
fillable: true

# Section overrides (walking defaults: behavior + service_specific only)
# We add home_access for pickup key codes, and vaccinations for group walks
sections:
  home_access: true           # Need key/code access for pickups
  vaccinations: true          # Required for group walks at dog parks

# Output
output: "dog_walker_intake.pdf"

# Branding
theme: ocean                  # Calming blue tones
